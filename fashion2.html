<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louve Collection</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            overflow-x: hidden;
        }
        .container{
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 60px;
            position: relative;
            min-height: 100vh;
        }
        /* Top Navigation*/
        .navbar{
            display: flex;
            justify-content: space-between;
            margin-bottom: 80px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .navbar a{
            text-decoration: none;
            color: #000;
        }
        .navbar .active{
            color: #E86A25;
        }
        /* Main Content*/
        .hero{
            display: flex;
             align-items: center;
            justify-content: space-between;
        }
        .hero-text{
            flex: 1;
        }
        .hero-text h1{
            font-size: 72px;
            color: #E86A25;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .hero-text h2{
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 80px;
        }
        .hero-text .size{
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 40px
        }
        .hero-text .new-stock{
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .stars{
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }
        .cta-button{
            width: 240px;
            height: 50px;
            background: #E86A25;
            border-radius: 25px;
            border: none;
            cursor: pointer;
        }
/*Image + Orange Circle*/
.hero-image{

      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .stars {
      font-size: 24px;
      letter-spacing: 4px;
      margin-bottom: 30px;
    }

    .cta-button {
      width: 240px;
      height: 50px;
      background: #E86A25;
      border-radius: 25px;
      border: none;
      cursor: pointer;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 24px;
    }

    /* Image + Orange Circle */
    .hero-image {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .orange-circle {
      width: 500px;
      height: 500px;
      background: #E86A25;
      border-radius: 50%;
      position: absolute;
      z-index: 1;
    }

    .model {
      position: relative;
      z-index: 2;
      max-height: 700px;
      /* You'll replace the src with your actual image */
    }

    /* Vertical "NEW" text on right */
    .vertical-text {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 14px;
      letter-spacing: 8px;
      color: #000;
    }
      img{
        width: 500px;
        height: 500px;
        border: 5px #0f0f0f;
        border-radius: 50%;
        display: 5px solid;
    }
  
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="arnaud.html">ORDER</a>
      <a href="index.html">ORDER</a>
      <a href="products.html" class="active">VISIT</a>
      <a href="contact.html">WEBSITE</a>
      <a href="#" class="active">BLACK</a>
      <a href="ishimwe.html">FASHION</a>
    </nav>

    <div class="hero">
      <div class="hero-text">
        <h1>SUMMER COATS</h1>
        <h2>louve collection</h2>
        <p class="size">size 56i</p>
        
        <p class="new-stock">NEW STOCK</p>
        <div class="stars">★★★★</div>
        <button class="cta-button"> Shop the collection</button>
      </div>

      <div class="hero-image">
        <div class="orange-circle"></div>
        <img src="https://i.pinimg.com/originals/68/7a/c1/687ac1f8a56347d6f124e7b1a29bfcef.jpg" alt=" Model wearing black coat"  class="model">
      </div>
    </div>

    <div class="vertical-text">
      NEW NEW NEW NEW
    </div>

</div>
</body>

</html>
